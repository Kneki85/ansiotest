<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear cuenta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
<div class="container narrow">
  <header>
    <h1>Evaluación de <span>Ansiedad</span> Estudiantil</h1>
    <p>Crea tu cuenta para empezar a registrar tus evaluaciones.</p>
  </header>

  <div class="section-card center-card">
    <div class="section-label">Registro</div>

    <form action="/registro" method="POST" class="name-form">
      <div class="field">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name="nombre" placeholder="Ej: María García" maxlength="80" required autofocus />
      </div>
      <div class="field">
        <label for="email">Correo</label>
        <input type="email" id="email" name="email" placeholder="tucorreo@ejemplo.com" required />
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="Mínimo 4 caracteres" required />
      </div>
      {% if error %}
      <div class="error-msg" style="display:block;">{{ error }}</div>
      {% endif %}
      <button type="submit" class="submit-btn">Crear cuenta →</button>
    </form>
  </div>

  <div class="footer-link">
    <span>¿Ya tienes cuenta?</span> <a href="/login">Inicia sesión</a>
  </div>
</div>
</body>
</html>
