<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — AnsioTest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
<div class="container narrow">
  <header>
    <h1>Ansio<span>Test</span></h1>
    <p>Inicia sesión para continuar.</p>
  </header>

  <div class="section-card center-card">
    <div class="breathing-rings" aria-hidden="true">
      <span class="ring"></span>
      <span class="ring"></span>
      <span class="ring"></span>
      <span class="core"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="9" cy="10" r="0.5" fill="currentColor"/><circle cx="15" cy="10" r="0.5" fill="currentColor"/><path d="M8 15c1 1.3 2.4 2 4 2s3-0.7 4-2"/></svg></span>
    </div>
    <div class="section-label">Iniciar sesión</div>

    <form action="/login" method="POST" class="name-form">
      <div class="field">
        <label for="email">Correo</label>
        <input type="email" id="email" name="email" placeholder="tucorreo@ejemplo.com" required autofocus />
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required />
      </div>
      {% if error %}
      <div class="error-msg" style="display:block;">{{ error }}</div>
      {% endif %}
      <button type="submit" class="submit-btn">Entrar →</button>
    </form>
  </div>

  <div class="footer-link">
    <span>¿No tienes cuenta?</span> <a href="/registro">Regístrate aquí</a>
  </div>
</div>
</body>
</html>
