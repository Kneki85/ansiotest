<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evaluación de Ansiedad Estudiantil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
<div class="container narrow">
  <header>
    <h1>Evaluación de <span>Ansiedad</span> Estudiantil</h1>
    <p>Herramienta de detección temprana para estudiantes universitarios.</p>
  </header>

  <div class="section-card center-card">
    <div class="section-label">Registro</div>
    <p class="card-intro">Ingresa tu nombre para comenzar. Tus resultados quedarán registrados en el historial.</p>

    <form action="/iniciar" method="POST" class="name-form">
      <div class="field">
        <label for="nombre">Nombre del estudiante</label>
        <input
          type="text"
          id="nombre"
          name="nombre"
          placeholder="Ej: María García"
          maxlength="80"
          required
          autofocus
        />
      </div>
      <button type="submit" class="submit-btn">Comenzar evaluación →</button>
    </form>
  </div>

  <div class="footer-link">
    <a href="/historial">Ver historial de evaluaciones</a>
  </div>
</div>
</body>
</html>
