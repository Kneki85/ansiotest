<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evaluación de Ansiedad Estudiantil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
<div class="container narrow">
  <header>
    <h1>Evaluación de <span>Ansiedad</span> Estudiantil</h1>
    <p>Herramienta de detección temprana para estudiantes universitarios.</p>
  </header>

  <div class="section-card center-card">
    <div class="section-label">Bienvenido/a</div>
    <p class="card-intro">Hola, <strong>{{ nombre }}</strong>. Tus resultados quedarán registrados en tu historial.</p>

    <a href="/evaluacion" class="submit-btn" style="display:block; text-align:center; text-decoration:none;">
      Comenzar evaluación →
    </a>
  </div>

  <div class="footer-link">
    <a href="/historial">Ver historial de evaluaciones</a>
  </div>
  <div class="footer-link">
    <a href="/logout">Cerrar sesión</a>
  </div>
</div>
</body>
</html>
